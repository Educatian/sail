name = "sail-api"
main = "src/index.ts"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]

# D1 binding — fill database_id after `wrangler d1 create sail`
[[d1_databases]]
binding = "DB"
database_name = "sail"
database_id = "03161a20-1d52-471a-a5b8-b49c7abf3ec4"

# Secrets: `wrangler secret put OPENROUTER_API_KEY` (mentor), `wrangler secret put RESEND_API_KEY` (email reminders)
[vars]
SAIL_MODEL = "anthropic/claude-sonnet-4"
RESEND_FROM = "SAIL <onboarding@resend.dev>"

# Daily reminder cron (16:00 UTC). Sends spacing-based metacognitive scaffold emails.
[triggers]
crons = ["0 16 * * *"]
